name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 2.1.0). Only for hotfixes.'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip only version-bump bot commits (which start with "chore: bump version").
    # Do NOT use contains(message, '[skip ci]') — squash merges include the full body
    # which may contain [skip ci] from version-bump commits on dev, causing the release
    # workflow to skip when it shouldn't.
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Manual override — validate and use
            V="${{ inputs.version }}"
            if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "ERROR: '$V' is not valid semver (expected X.Y.Z)" >&2
              exit 1
            fi

            # Update version files for manual override
            jq --arg v "$V" '.version = $v' plugins/code-security/.claude-plugin/plugin.json > tmp.json && mv tmp.json plugins/code-security/.claude-plugin/plugin.json
            jq --arg v "$V" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json
            git add plugins/code-security/.claude-plugin/plugin.json .claude-plugin/marketplace.json
            git commit -m "chore: release v${V} [skip ci]" || true
            git push || true
          else
            # Read version from plugin.json (already bumped on dev, now on main via PR)
            V=$(jq -r '.version' plugins/code-security/.claude-plugin/plugin.json)
          fi

          # Abort if tag already exists
          if git rev-parse "v${V}" &>/dev/null; then
            echo "Tag v${V} already exists — skipping release" >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        if: steps.version.outputs.skip != 'true'
        id: notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)")
          else
            LOG=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo ""
            echo "---"
            echo "## Install"
            echo ""
            echo "In Claude Code:"
            echo "\`\`\`"
            echo "/plugin marketplace add ${{ github.repository }}"
            echo "/plugin install code-security@fortinet-plugins"
            echo "\`\`\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        run: |
          V="${{ steps.version.outputs.version }}"
          git tag "v${V}"
          git push origin "v${V}"

      - name: Package plugin
        if: steps.version.outputs.skip != 'true'
        run: |
          V="${{ steps.version.outputs.version }}"
          VERSIONED_ZIP="forticnapp-llm-plugins-v${V}.zip"
          LATEST_ZIP="forticnapp-llm-plugins.zip"
          zip -r "$VERSIONED_ZIP" \
            .claude-plugin/ \
            plugins/code-security/ \
            README.md \
            LICENSE
          cp "$VERSIONED_ZIP" "$LATEST_ZIP"
          echo "versioned_zip=$VERSIONED_ZIP" >> "$GITHUB_ENV"
          echo "latest_zip=$LATEST_ZIP" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: |
            ${{ env.versioned_zip }}
            ${{ env.latest_zip }}
