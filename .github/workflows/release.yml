name: Release

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '!plugins/**/*.md'
      - '.claude-plugin/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.1.0). Overrides auto-bump.'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    # Prevent the version-bump commit from triggering another release
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          echo "version=$(jq -r '.version' plugins/code-security/.claude-plugin/plugin.json)" >> "$GITHUB_OUTPUT"

      - name: Resolve target version
        id: target
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            # Manual release — use the provided version exactly
            NEW_VERSION="${{ inputs.version }}"
            # Validate semver format
            if ! echo "$NEW_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "ERROR: '$NEW_VERSION' is not a valid semver (expected X.Y.Z)" >&2
              exit 1
            fi
          else
            # Auto-release — determine bump from conventional commits since last tag
            CURRENT="${{ steps.current.outputs.version }}"
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

            if [ -n "$LAST_TAG" ]; then
              SUBJECTS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
            else
              SUBJECTS=$(git log --pretty=format:"%s")
            fi

            BUMP="patch"
            if echo "$SUBJECTS" | grep -qE '^(feat|fix|refactor|perf)(\(.+\))?!:'; then
              BUMP="major"
            elif echo "$SUBJECTS" | grep -qE '^feat(\(.+\))?:'; then
              BUMP="minor"
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "$BUMP" in
              major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
              minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
              patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
            esac
          fi

          # Abort if tag already exists
          if git rev-parse "v${NEW_VERSION}" &>/dev/null; then
            echo "ERROR: Tag v${NEW_VERSION} already exists" >&2
            exit 1
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release notes
        id: notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            LOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)")
          else
            LOG=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo ""
            echo "---"
            echo "## Install"
            echo ""
            echo "In Claude Code:"
            echo "\`\`\`"
            echo "/plugin marketplace add ${{ github.repository }}"
            echo "/plugin install code-security@fortinet-plugins"
            echo "\`\`\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update version in plugin files
        run: |
          V="${{ steps.target.outputs.version }}"
          # Update plugin.json (under plugins/code-security/)
          jq --arg v "$V" '.version = $v' plugins/code-security/.claude-plugin/plugin.json > tmp.json && mv tmp.json plugins/code-security/.claude-plugin/plugin.json
          # Update marketplace.json (at root)
          jq --arg v "$V" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit version bump and tag
        run: |
          V="${{ steps.target.outputs.version }}"
          git add plugins/code-security/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: release v${V} [skip ci]"
          git push
          git tag "v${V}"
          git push origin "v${V}"

      - name: Package plugin
        run: |
          V="${{ steps.target.outputs.version }}"
          VERSIONED_ZIP="forticnapp-llm-plugins-v${V}.zip"
          LATEST_ZIP="forticnapp-llm-plugins.zip"
          zip -r "$VERSIONED_ZIP" \
            .claude-plugin/ \
            plugins/code-security/ \
            README.md
          cp "$VERSIONED_ZIP" "$LATEST_ZIP"
          echo "versioned_zip=$VERSIONED_ZIP" >> "$GITHUB_ENV"
          echo "latest_zip=$LATEST_ZIP" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.target.outputs.version }}"
          name: "v${{ steps.target.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: |
            ${{ env.versioned_zip }}
            ${{ env.latest_zip }}
