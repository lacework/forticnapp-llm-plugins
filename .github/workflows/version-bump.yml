name: Version Bump

on:
  push:
    branches: [dev]
    paths:
      - 'plugins/**'
      - '!plugins/**/*.md'
      - '.claude-plugin/**'

jobs:
  bump:
    runs-on: ubuntu-latest
    # Prevent loop: the version bump commit starts with "chore: bump version"
    # which would re-trigger this workflow since it touches plugins/**
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: dev

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          echo "version=$(jq -r '.version' plugins/code-security/.claude-plugin/plugin.json)" >> "$GITHUB_OUTPUT"

      - name: Determine version bump
        id: bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            SUBJECTS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s")
          else
            SUBJECTS=$(git log --pretty=format:"%s")
          fi

          BUMP="patch"
          if echo "$SUBJECTS" | grep -qE '^(feat|fix|refactor|perf)(\(.+\))?!:'; then
            BUMP="major"
          elif echo "$SUBJECTS" | grep -qE '^feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          if [ "$NEW_VERSION" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version files
        if: steps.bump.outputs.skip != 'true'
        run: |
          V="${{ steps.bump.outputs.version }}"
          jq --arg v "$V" '.version = $v' plugins/code-security/.claude-plugin/plugin.json > tmp.json && mv tmp.json plugins/code-security/.claude-plugin/plugin.json
          jq --arg v "$V" '.plugins[0].version = $v' .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Commit and push
        if: steps.bump.outputs.skip != 'true'
        run: |
          V="${{ steps.bump.outputs.version }}"
          git add plugins/code-security/.claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to v${V} [skip ci]"
          git push
